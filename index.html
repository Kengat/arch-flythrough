<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Облёт архитектуры</title>
  <script src="config.js"></script>
  <style>
    :root { --bg:#0e0f12; --panel:#16181d; --text:#f2f3f5; --muted:#9aa0aa; --accent:#5b8def; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: radial-gradient(120% 120% at 50% 0%, #1a1c22 0%, var(--bg) 60%);
      color: var(--text);
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100%;
      display: flex; flex-direction: column; align-items: center;
      padding: 5vh 16px 40px;
    }
    header { text-align: center; margin-bottom: 24px; }
    h1 { font-size: clamp(22px, 5vw, 34px); font-weight: 600; letter-spacing: .3px; }
    .subtitle { color: var(--muted); margin-top: 6px; font-size: clamp(13px, 3vw, 16px); }
    .stage {
      width: min(1100px, 100%);
      background: var(--panel);
      border: 1px solid #23262d;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,.45);
    }
    .ratio { position: relative; width: 100%; aspect-ratio: 16 / 9; background:#000; }
    .ratio > * { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    video { object-fit: contain; background:#000; }
    .placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; color: var(--muted); text-align: center; padding: 24px;
    }
    .placeholder code { background:#0a0b0e; padding:2px 8px; border-radius:6px; color:#cdd3dc; }
    footer { color: var(--muted); font-size: 12px; margin-top: 22px; text-align: center; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1 id="title">Облёт архитектуры</h1>
    <div class="subtitle" id="subtitle"></div>
  </header>

  <main class="stage">
    <div class="ratio" id="stage"></div>
  </main>

  <footer>Наведите камеру телефона на QR-код, чтобы открыть эту страницу.</footer>

  <script>
    (function () {
      var c = window.CONFIG || {};
      document.getElementById('title').textContent = c.title || 'Видео';
      document.title = c.title || 'Видео';
      var sub = document.getElementById('subtitle');
      if (c.subtitle) { sub.textContent = c.subtitle; } else { sub.style.display = 'none'; }

      var stage = document.getElementById('stage');

      if (c.youtubeId) {
        var iframe = document.createElement('iframe');
        iframe.src = 'https://www.youtube.com/embed/' + encodeURIComponent(c.youtubeId) + '?rel=0&modestbranding=1';
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen';
        iframe.allowFullscreen = true;
        stage.appendChild(iframe);
      } else if (c.videoFile) {
        var video = document.createElement('video');
        video.src = c.videoFile;
        video.controls = true;
        video.playsInline = true;
        video.preload = 'metadata';
        if (c.poster) video.poster = c.poster;
        stage.appendChild(video);
        video.addEventListener('error', showPlaceholder);
      } else {
        showPlaceholder();
      }

      function showPlaceholder() {
        stage.innerHTML =
          '<div class="placeholder">' +
          '<div style="font-size:40px">🎬</div>' +
          '<div>Видео ещё не добавлено.</div>' +
          '<div style="font-size:13px">Открой <code>config.js</code> и укажи файл <code>video/…mp4</code> или <code>youtubeId</code>.</div>' +
          '</div>';
      }
    })();
  </script>
</body>
</html>
